<section class="team">
  <div class="team-container">
    <!-- Header -->
    <div class="team-header">
      <div class="back-button">
        <button type="button" aria-label="Go Back" (click)="goBack()">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none">

            <path
              d="M15 18L9 12L15 6"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round">
            </path>

          </svg>
        </button>
      </div>

      <div class="header-text">
        <h2>Meet Our Team</h2>
        <p>The experts behind AppNest's success</p>
      </div>

    </div>
    <!-- Team Grid -->
    <div class="team-grid">
      <div
        class="team-card"
        *ngFor="let member of teamMembers">
        <!-- Image -->
        <div class="profile-image">
          <img
            [src]="member.image"
            [alt]="member.name">
        </div>
        <!-- Name -->
        <h3 class="member-name">
          {{ member.name }}
        </h3>
        <!-- Role -->
        <p class="member-role">
          {{ member.role }}
        </p>
        <!-- Description -->
        <p class="member-description">
          {{ member.description }}
        </p>
        <!-- Skills -->
        <div class="skills">
          <p class="skills-title">
            SKILLS
          </p>
          <div class="skills-list">
            <span
              class="skill"
              *ngFor="let skill of member.skills">
              {{ skill }}
            </span>
          </div>
        </div>
        <!-- Social Links -->
        <div class="social-links">
          <!-- Github -->
          <a
            [href]="member.github"
            target="_blank"
            class="social-btn"
            aria-label="Github">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor">
              <path d="M12 .5C5.65.5.5 5.65.5 12c0 5.09 3.29 9.41 7.86 10.94.58.11.79-.25.79-.56v-2.16c-3.2.69-3.87-1.54-3.87-1.54-.52-1.31-1.27-1.66-1.27-1.66-1.04-.71.08-.7.08-.7 1.15.08 1.75 1.18 1.75 1.18 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.24.72-1.53-2.55-.29-5.23-1.28-5.23-5.68 0-1.25.45-2.28 1.18-3.09-.12-.29-.51-1.46.11-3.04 0 0 .96-.31 3.15 1.18a10.8 10.8 0 015.74 0c2.19-1.49 3.15-1.18 3.15-1.18.62 1.58.23 2.75.11 3.04.73.81 1.18 1.84 1.18 3.09 0 4.41-2.69 5.38-5.26 5.67.41.36.77 1.06.77 2.14v3.17c0 .31.21.68.8.56A11.51 11.51 0 0023.5 12C23.5 5.65 18.35.5 12 .5z"/>
            </svg>
          </a>
          <!-- LinkedIn -->
          <a
            [href]="member.linkedin"
            target="_blank"
            class="social-btn"
            aria-label="LinkedIn">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="currentColor">

              <path d="M4.98 3.5C4.98 4.88 3.87 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1 4.98 2.12 4.98 3.5zM.5 8h4V24h-4V8zm7 0h3.84v2.18h.05c.53-1.01 1.84-2.18 3.79-2.18 4.05 0 4.8 2.67 4.8 6.13V24h-4v-7.03c0-1.68-.03-3.84-2.34-3.84-2.34 0-2.7 1.83-2.7 3.72V24h-4V8z"/>
            </svg>
          </a>
          <!-- Email-->
          <a
            [href]="'mailto:' + member.email"
            class="social-btn"
            aria-label="Email">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none">
              <path
                d="M4 5H20C21.1 5 22 5.9 22 7V17C22 18.1 21.1 19 20 19H4C2.9 19 2 18.1 2 17V7C2 5.9 2.9 5 4 5Z"
                stroke="currentColor"
                stroke-width="2"/>
              <path
                d="M22 7L12 13L2 7"
                stroke="currentColor"
                stroke-width="2"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<app-footer></app-footer>
