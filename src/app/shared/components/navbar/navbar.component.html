<header class="navbar" [class.scrolled]="scrolled">

  <div class="navbar-container">

    <!-- =========================
         LOGO
    ========================== -->

    <a href="/" class="logo">

      <img src="assets/logo.svg" alt="AppNest Logo">

      <span>AppNest</span>

    </a>

    <!-- =========================
         DESKTOP NAVIGATION
    ========================== -->

    <nav class="nav-links" [class.active]="menuOpen">

      <a href="#services" (click)="closeMenu()">
        Services
      </a>

      <a href="#clients" (click)="closeMenu()">
        Clients
      </a>

      <a href="#testimonials" (click)="closeMenu()">
        Testimonials
      </a>

      <a href="/team" (click)="closeMenu()">
        Team
      </a>

      <a href="#contact" (click)="closeMenu()">
        Contact
      </a>

    </nav>

    <!-- =========================
         ACTIONS
    ========================== -->

    <div class="actions">

      <!-- Theme -->

      <button
        class="theme-btn"
        (click)="toggleTheme()"
        aria-label="Toggle Theme">

        @if(isDarkMode){

          <ion-icon name="sunny"></ion-icon>

        } @else {

          <ion-icon name="moon"></ion-icon>

        }

      </button>

      <!-- CTA -->

      <button class="cta">

        Get in Touch

      </button>

      <!-- =========================
           MOBILE MENU BUTTON
      ========================== -->

      <button
        class="menu-btn"
        (click)="toggleMenu()"
        aria-label="Open Menu">

        @if(menuOpen){

          <!-- Close Icon -->

          <svg
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none">

            <path
              d="M18 6L6 18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

            <path
              d="M6 6L18 18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

          </svg>

        } @else {

          <!-- Hamburger -->

          <svg
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none">

            <path
              d="M3 6H21"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

            <path
              d="M3 12H21"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

            <path
              d="M3 18H21"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"/>

          </svg>

        }

      </button>

    </div>

  </div>

</header>
